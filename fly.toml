# fly.toml file generated for rag-legal-app on Fly.io

app = "rag-legal-app"
primary_region = "iad"
console_command = "/bin/sh"

[build]
  dockerfile = "Dockerfile"
  
[env]
  OPENAI_API_KEY = ""
  SPRING_PROFILES_ACTIVE = "production"
  JAVA_OPTS = "-Xmx256m -Xms128m"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[checks]
  [checks.alive]
    type = "http"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/rag/health"

[metrics]
  port = 9090
  path = "/metrics"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
  processes = ["app"]
